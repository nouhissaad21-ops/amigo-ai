name: PR Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/global-meta-voice-onboarding'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture check output
        id: check
        shell: bash
        run: |
          set +e
          npm run check > diagnostic.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: amigo-check-diagnostic
          path: diagnostic.txt
          if-no-files-found: error
      - name: Preserve failure status
        if: steps.check.outputs.status != '0'
        run: exit 1
