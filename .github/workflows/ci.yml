name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run checks
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee check.log
      - name: Upload check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-log
          path: check.log
