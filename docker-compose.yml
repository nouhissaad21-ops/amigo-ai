x-runtime-environment: &runtime-environment
  DATABASE_URL: postgresql://amigo_system:${AMIGO_SYSTEM_PASSWORD}@postgres:5432/${POSTGRES_DB:-amigo}?schema=public
  DATABASE_TENANT_URL: postgresql://amigo_app:${AMIGO_APP_PASSWORD}@postgres:5432/${POSTGRES_DB:-amigo}?schema=public
  REDIS_URL: redis://redis:6379
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-amigo}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      AMIGO_SYSTEM_PASSWORD: ${AMIGO_SYSTEM_PASSWORD}
      AMIGO_APP_PASSWORD: ${AMIGO_APP_PASSWORD}
    volumes:
      [
        postgres_data:/var/lib/postgresql/data,
        ./docker/postgres/01-roles.sh:/docker-entrypoint-initdb.d/01-roles.sh:ro,
      ]
    healthcheck:
      {
        test: [CMD-SHELL, "pg_isready -U postgres -d $${POSTGRES_DB}"],
        interval: 5s,
        timeout: 5s,
        retries: 20,
      }
    networks: [amigo]
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: [redis-server, --appendonly, "yes", --maxmemory-policy, noeviction]
    volumes: [redis_data:/data]
    healthcheck:
      { test: [CMD, redis-cli, ping], interval: 5s, timeout: 3s, retries: 20 }
    networks: [amigo]
  migrate:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    command: [npx, prisma, migrate, deploy]
    environment: { <<: *runtime-environment }
    depends_on: { postgres: { condition: service_healthy } }
    networks: [amigo]
  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    restart: unless-stopped
    env_file: .env
    environment: { <<: *runtime-environment }
    depends_on:
      {
        migrate: { condition: service_completed_successfully },
        redis: { condition: service_healthy },
      }
    ports: ["${API_BIND_ADDRESS:-127.0.0.1}:${PORT:-4000}:4000"]
    networks: [amigo]
  worker:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    command: [node, apps/api/dist/worker.js]
    restart: unless-stopped
    env_file: .env
    environment: { <<: *runtime-environment }
    depends_on:
      {
        migrate: { condition: service_completed_successfully },
        redis: { condition: service_healthy },
      }
    networks: [amigo]
  whatsapp-gateway:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    command: [node, apps/api/dist/whatsapp-gateway.js]
    restart: unless-stopped
    env_file: .env
    environment: { <<: *runtime-environment }
    depends_on:
      {
        migrate: { condition: service_completed_successfully },
        redis: { condition: service_healthy },
      }
    networks: [amigo]
  web:
    build: { context: ., dockerfile: apps/web/Dockerfile }
    restart: unless-stopped
    environment:
      { PORT: 3000, HOSTNAME: 0.0.0.0, INTERNAL_API_URL: http://api:4000 }
    depends_on: { api: { condition: service_started } }
    ports: ["${WEB_BIND_ADDRESS:-0.0.0.0}:3000:3000"]
    networks: [amigo]
volumes: { postgres_data: {}, redis_data: {} }
networks: { amigo: { driver: bridge } }
